<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.5rem;
      color: #a0a0c0;
    }

    #status.winner { color: #4ecca3; font-weight: bold; }
    #status.draw   { color: #f5a623; font-weight: bold; }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #4ecca3; }

    .cell.winning {
      background: #0f3460;
      border-color: #4ecca3;
      animation: pulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { box-shadow: 0 0 6px #4ecca3; }
      to   { box-shadow: 0 0 18px #4ecca3; }
    }

    #reset {
      margin-top: 1.8rem;
      padding: 0.7rem 2rem;
      font-size: 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
    }

    #reset:hover { background: #c73652; transform: scale(1.04); }

    #score {
      display: flex;
      gap: 2rem;
      margin-top: 1.5rem;
      font-size: 0.95rem;
      color: #a0a0c0;
    }

    #score span { font-weight: bold; font-size: 1.1rem; }
    .score-x span { color: #e94560; }
    .score-o span { color: #4ecca3; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="reset">New Game</button>

  <div id="score">
    <div class="score-x">X Wins: <span id="wx">0</span></div>
    <div>Draws: <span id="wd">0</span></div>
    <div class="score-o">O Wins: <span id="wo">0</span></div>
  </div>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, scores = {X:0, O:0, D:0};

    function init() {
      board = Array(9).fill('');
      current = 'X';
      gameOver = false;
      document.querySelectorAll('.cell').forEach(c => {
        c.textContent = '';
        c.className = 'cell';
      });
      setStatus("X's turn");
    }

    function setStatus(msg, type = '') {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = type;
    }

    function checkWinner() {
      for (const [a,b,c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { winner: board[a], line: [a,b,c] };
        }
      }
      if (board.every(Boolean)) return { winner: null, line: [] };
      return null;
    }

    document.querySelectorAll('.cell').forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (gameOver || board[i]) return;

        board[i] = current;
        cell.textContent = current;
        cell.classList.add('taken', current.toLowerCase());

        const result = checkWinner();
        if (result) {
          gameOver = true;
          if (result.winner) {
            result.line.forEach(idx =>
              document.querySelector(`[data-i="${idx}"]`).classList.add('winning')
            );
            scores[result.winner]++;
            setStatus(`${result.winner} wins!`, 'winner');
          } else {
            scores.D++;
            setStatus("It's a draw!", 'draw');
          }
          document.getElementById('wx').textContent = scores.X;
          document.getElementById('wo').textContent = scores.O;
          document.getElementById('wd').textContent = scores.D;
          return;
        }

        current = current === 'X' ? 'O' : 'X';
        setStatus(`${current}'s turn`);
      });
    });

    document.getElementById('reset').addEventListener('click', init);

    init();
  </script>
</body>
</html>
